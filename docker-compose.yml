
services:
  # 1. La Aplicación Interna (Inaccesible desde fuera, solo CORE la ve)
  intranet-app:
    image: nginx:alpine
    volumes:
      - ./html/index.html:/usr/share/nginx/html/index.html

  # 2. CORE Platform (El Guardián SASE)
  core-platform:
    image: nginx:alpine
    ports:
      - "8080:80" # Accederemos por localhost:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./html/error.html:/usr/share/nginx/html_custom/error.html
    # Comando para crear un usuario y contraseña al iniciar (Usuario: admin, Clave: core123)
    command: >
      /bin/sh -c "apk add --no-cache apache2-utils &&
      htpasswd -cb /etc/nginx/.htpasswd admin core123 &&
      nginx -g 'daemon off;'"